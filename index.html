<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Workout Drill Catalog</title>

  <!-- Link CSS -->
  <link rel="stylesheet" href="style.css">
</head>

<body>

  <header>
    <h1>Workout Drill Catalog</h1>
    <p>Create, explore, and generate custom workout plans</p>
  </header>

  <!-- Filters -->
  <div class="filters">
    <input type="text" id="search-input" placeholder="Search For Drills...">

    <select id="difficulty-filter">
      <option value="">All Difficulties</option>
      <option value="Beginner">Beginner</option>
      <option value="Intermediate">Intermediate</option>
      <option value="Advanced">Advanced</option>
    </select>

    <select id="category-filter">
      <option value="">All Categories</option>
      <option value="Cardio">Cardio</option>
      <option value="Strength">Strength</option>
      <option value="Core">Core</option>
      <option value="Mobility">Mobility</option>
      <option value="Speed">Speed</option>
      <option value="Full Body">Full Body</option>
      <option value="Endurance">Endurance</option>
    </select>

    <select id="goal-filter">
      <option value="">All Goals</option>
      <option value="strength">Strength</option>
      <option value="endurance">Endurance</option>
      <option value="fat loss">Fat Loss</option>
      <option value="power">Power</option>
      <option value="mobility">Mobility</option>
      <option value="core strength">Core Strength</option>
      <option value="speed">Speed</option>
    </select>

    <select id="sort-select">
      <option value="">Sort By</option>
      <option value="time">Time</option>
      <option value="difficulty">Difficulty</option>
    </select>

    <button id="reset-btn">Reset Filters</button>
  </div>

  <!-- Drill Cards -->
  <div id="drill-container" class="grid"></div>

  <div id="workout-generator">
    <h2>Workout Plan Generator</h2>
  
    <button id="generate-plan" type= "button">Generate Workout Plan</button>
  
    <div id="workout-plan" class="workout-plan"></div>
  </div>

  <!-- Link JS (later) -->
  <script src="scripts.js"></script>

</body>
</html>
